<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCTU Assignment - Apex Terra HR Bot</title>
    <style>
        :root {
            --primary-color: #004a99;
            --secondary-color: #f4f7f6;
            --bot-bubble: #e9e9eb;
            --user-bubble: #004a99;
            --text-dark: #333;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #d1d9e6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        #chat-container { 
            width: 100%; 
            max-width: 450px; 
            height: 80vh;
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        #header { 
            background: var(--primary-color); 
            color: white; 
            padding: 20px; 
            text-align: center; 
        }

        #header h2 { margin: 0; font-size: 1.2rem; }
        #header p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.8; }

        #messages { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background-color: #fff;
        }

        .msg { 
            padding: 10px 15px; 
            border-radius: 18px; 
            font-size: 14px; 
            line-height: 1.5; 
            word-wrap: break-word;
        }

        .user-msg { 
            background: var(--user-bubble); 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
        }

        .bot-msg { 
            background: var(--bot-bubble); 
            color: var(--text-dark); 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
        }

        #input-area { 
            display: flex; 
            padding: 15px; 
            border-top: 1px solid #eee;
            background: #fafafa;
        }

        input { 
            flex: 1; 
            border: 1px solid #ddd; 
            padding: 12px; 
            border-radius: 25px; 
            outline: none; 
            font-size: 14px;
        }

        button { 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            padding: 0 20px; 
            margin-left: 10px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        /* Scrollbar styling */
        #messages::-webkit-scrollbar { width: 5px; }
        #messages::-webkit-scrollbar-track { background: #f1f1f1; }
        #messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <h2>Apex Terra HR Assistant</h2>
        <p>Candidate Engagement Bot • GCTU MA HRM</p>
    </div>
    <div id="messages">
        <div class="msg bot-msg">Welcome! I am the virtual HR assistant for Apex Terra Garage. I can help you with information regarding our mission, culture, job openings, benefits, and more. What would you like to know?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask about culture, jobs, pay..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const messageContainer = document.getElementById('messages');
    const userInput = document.getElementById('user-input');

    // HR Knowledge Base for Assignment 3
    const botKnowledge = {
        "mission": "Apex Terra Garage's mission is to provide sustainable automotive excellence through innovation and integrity. We value transparency and technical mastery.",
        "vision": "We aim to be Ghana's leading eco-friendly automotive service provider, setting the standard for green tech in the industry.",
        "culture": "At Apex Terra Garage, we foster a culture of innovation and collaboration. We are a team-oriented shop where continuous learning and diversity are prioritized.",
        "jobs": "We are currently looking for Junior Technicians and Service Advisors. We prioritize internal mobility, helping our staff move into senior management roles.",
        "process": "Our recruitment process involves an initial screening, a practical technical assessment, and a final culture-fit interview.",
        "salary": "We offer competitive salary structures with performance-based bonuses and comprehensive health insurance for all full-time staff.",
        "pay": "We offer competitive salary structures with performance-based bonuses and comprehensive health insurance for all full-time staff.",
        "benefits": "Staff enjoy health insurance, annual bonuses, and a generous employee discount on all automotive parts and services.",
        "hours": "Our team works in shifts from 8:00 AM to 6:00 PM. While technicians work on-site, our administrative roles follow a hybrid model.",
        "remote": "Administrative and customer service roles are eligible for our hybrid work model (2 days remote per week).",
        "training": "We invest in our people through monthly upskilling programs and certifications in modern hybrid and electric vehicle maintenance.",
        "internship": "Our 'Garage Stars' internship program is open to GCTU students and recent graduates looking for hands-on experience in automotive management.",
        "graduate": "Our 'Garage Stars' internship program is open to GCTU students and recent graduates looking for hands-on experience in automotive management."
    };

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg', sender === 'user' ? 'user-msg' : 'bot-msg');
        msgDiv.innerText = text;
        messageContainer.appendChild(msgDiv);
        messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    function sendMessage() {
        const rawText = userInput.value.trim();
        const lowerText = rawText.toLowerCase();
        
        if (!rawText) return;

        appendMessage(rawText, 'user');
        userInput.value = '';

        // Simulating AI "thinking" time
        setTimeout(() => {
            let response = "I'm sorry, I don't have specific details on that. Try asking about our 'culture', 'job openings', 'salary', 'training', or 'internships'.";

            // Keyword matching logic
            for (let key in botKnowledge) {
                if (lowerText.includes(key)) {
                    response = botKnowledge[key];
                    break; 
                }
            }

            appendMessage(response, 'bot');
        }, 700);
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
